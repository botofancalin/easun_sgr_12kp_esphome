substitutions:
  inverter_id: "easun" # Customisable inverter name
  inverter_updates: 10s
  inverter_slow_updates: 60s

esphome:
  name: ${inverter_id}-sgr-12kp
  friendly_name: SGR-12KP
  comment: "Monitor EaSun SGR-12KP Solar Inverter"
  
# you can configure your esp32 or esp8266 board below
esp32:
  board: lolin_s3_mini
  variant: ESP32S3
  flash_size: 4MB
  cpu_frequency: 240MHZ
  framework:
    type: esp-idf
    advanced:
      loop_task_stack_size: "16384"

# esp32s3 specific PSRAM configuration
psram:
  mode: quad 
  speed: 80MHZ

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:

ota:
  - platform: esphome
    id: esphome_ota
  - platform: web_server

web_server:
  version: 3
  port: 80

logger:
  baud_rate: 0

time:
  - platform: homeassistant
    id: homeassistant_time

uart:
  id: uart_0
  tx_pin: GPIO43
  rx_pin: GPIO44
  baud_rate: 9600

modbus:
  id: ${inverter_id}_modbus

modbus_controller:
  - id: ${inverter_id}
    address: 0x01
    modbus_id: ${inverter_id}_modbus
    command_throttle: 200ms
    setup_priority: -10
    update_interval: ${inverter_updates}
    max_cmd_retries: 2

debug:
  update_interval: ${inverter_updates}

################################### Text Sensors #######################################
text_sensor:
  - platform: template
    entity_category: "diagnostic"
    name: Inverter Date
    lambda: |-
      int year = (id(${inverter_id}_year).state);
      int month = (id(${inverter_id}_month).state);
      int day = (id(${inverter_id}_day).state);
      return { ( std::to_string(day) + "/" + std::to_string(month) + "/" + std::to_string(year)).c_str() };
    icon: mdi:calendar
    update_interval: ${inverter_slow_updates}

  - platform: template
    entity_category: "diagnostic"
    name: Inverter Time
    lambda: |-
      int hour = (id(${inverter_id}_hour).state);
      int minute = (id(${inverter_id}_minute).state);
      int second = (id(${inverter_id}_second).state);
      return { ( std::to_string(hour) + ":" + std::to_string(minute) + ":" + std::to_string(second)).c_str() };
    icon: mdi:clock-outline
    update_interval: ${inverter_updates}

  - platform: modbus_controller
    modbus_controller_id: ${inverter_id}
    name: "Startup Status" 
    id: ${inverter_id}_startup_status
    register_type: holding
    address: 0x7594 
    raw_encode: HEXBYTES
    lambda: |-
      char buf[4];
      uint16_t value = modbus::helpers::word_from_hex_str(x, 0);
      switch (value) {
        case 0: 
          x = "Initialization";
          break;
        case 1: 
          x = "Standby";
          break;
        case 2: 
          x = "Grid-connected";
          break;
        case 3: 
          x = "Inverting";
          break;
        default: 
          snprintf(buf, sizeof(buf), "%d%%", int(value));
          x = buf;
          break;
      }
      return x;

  - platform: modbus_controller
    modbus_controller_id: ${inverter_id}
    name: "Inverter State" 
    id: ${inverter_id}_inverter_state 
    register_type: holding
    address: 0x7595 
    raw_encode: HEXBYTES
    lambda: |-
      char buf[4];
      uint16_t value = modbus::helpers::word_from_hex_str(x, 0);
      switch (value) {
        case 0: 
          x = "Off";
          break;
        case 1: 
          x = "Grid Bypass";
          id(${inverter_id}_grid_connected_status).publish_state(true);
          break;
        case 2: 
          x = "Inverter Active";
          id(${inverter_id}_grid_connected_status).publish_state(false);
          break;
        default: 
          snprintf(buf, sizeof(buf), "%d%%", int(value));
          x = buf;
          break;
      }
      return x;

  - platform: modbus_controller
    modbus_controller_id: ${inverter_id}
    name: "Charge state" 
    id: ${inverter_id}_charge_state 
    register_type: holding
    address: 0x7596
    raw_encode: HEXBYTES
    lambda: |-
      char buf[4];
      uint16_t value = modbus::helpers::word_from_hex_str(x, 0);
      switch (value) {
        case 0: 
          x = "Quick Charge";
          break;
        case 2: 
          x = "Const V Charge";
          break;
        case 4: 
          x = "Float Charge";
          break;
        case 6: 
          x = "Li Battery Active";
          break;
        case 8: 
          x = "Full";
          break;
        case 16:
          x = "Battery self-test in progress";
          break;
        default: 
          snprintf(buf, sizeof(buf), "%d%%", int(value));
          x = buf;
          break;
      }
      return x;

  - platform: template
    entity_category: diagnostic
    name: Uptime
    lambda: |-
      int seconds = (id(uptime_internal).state);
      int days = seconds / (24 * 3600);
      seconds = seconds % (24 * 3600); 
      int hours = seconds / 3600;
      seconds = seconds % 3600;
      int minutes = seconds /  60;
      seconds = seconds % 60;
      return { ( std::to_string(days) + "d " + std::to_string(hours) + "h " + std::to_string(minutes) + "m " + std::to_string(seconds) + "s").c_str() };
    icon: mdi:clock-start
    update_interval: ${inverter_updates}

################################### Settings #######################################
select:
  - platform: modbus_controller
    modbus_controller_id: ${inverter_id}
    name: "Output Prority"
    id: ${inverter_id}_output_priority
    address: 0xA028
    force_new_range: True
    use_write_multiple: True
    value_type: U_WORD
    icon: mdi:power
    optionsmap:
      "SOL": 0
      "UTI": 1
      "SBU": 2

  - platform: modbus_controller
    modbus_controller_id: ${inverter_id}
    name: "Charger Source Priority"
    id: ${inverter_id}_charger_source
    address: 0xA02E
    force_new_range: True
    use_write_multiple: True
    value_type: U_WORD
    icon: mdi:cog
    optionsmap:
      "Solar first": 0
      "Utility first": 1
      "Solar and Utility": 2
