# ################################ Templates ##################################

  - platform: template
    name: "Battery Power"
    id: ${inverter_id}_battery_power
    state_class: measurement 
    unit_of_measurement: "W"
    accuracy_decimals: 1
    device_class: power
    update_interval: ${inverter_updates}
    lambda: |-
      return id(${inverter_id}_battery_current).state * id(${inverter_id}_battery_voltage).state;

  - platform: template
    name: "Load Power Factor"
    id: ${inverter_id}_load_power_factor
    state_class: measurement
    accuracy_decimals: 2
    device_class: power_factor
    update_interval: ${inverter_updates}
    lambda: |-
      float x = 1.0;
      if (id(${inverter_id}_output_aparent_Power).state > 0) 
      {
        x = id(${inverter_id}_output_active_power).state / id(${inverter_id}_output_aparent_Power).state;
      }
      return x;

  - platform: uptime
    id: uptime_internal

  - platform: debug
    loop_time:
        name: "Loop Time"
    min_free:
      name: Min Free
    psram:
      name: PSRAM free
    free:
      name: Free

binary_sensor:
  - platform: template
    name: "Grid Connected"
    icon: mdi:transmission-tower
    id: ${inverter_id}_grid_connected_status